workflows:
  # ═══════════════════════════════════════════════════════════════════════
  # ANDROID — Genera APK debug sin necesidad de keystore
  # ═══════════════════════════════════════════════════════════════════════
  android-debug:
    name: RaveSync Android Debug APK
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      vars:
        PACKAGE_NAME: "com.tadeo.ravesync"
      node: 22.12.0
      java: 21

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install npm dependencies
        script: |
          rm -f package-lock.json
          npm install

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor Android
        script: npx cap sync android

      - name: Build Android Debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - tadeo@example.com  # ← Cambia por tu email real
        notify:
          success: true
          failure: true

  # ═══════════════════════════════════════════════════════════════════════
  # ANDROID RELEASE — Genera APK/AAB firmado (necesita keystore en Codemagic)
  # ═══════════════════════════════════════════════════════════════════════
  android-release:
    name: RaveSync Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      android_signing:
        - ravesync_keystore  # Configura esto en Codemagic UI > Code signing
      vars:
        PACKAGE_NAME: "com.tadeo.ravesync"
      node: 22.12.0
      java: 21

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "v*"
          include: true

    scripts:
      - name: Install npm dependencies
        script: |
          rm -f package-lock.json
          npm install

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor Android
        script: npx cap sync android

      - name: Set up keystore
        script: |
          # Codemagic auto-sets CM_KEYSTORE, CM_KEY_ALIAS, etc.
          echo "storeFile=$CM_KEYSTORE" >> android/key.properties
          echo "storePassword=$CM_KEYSTORE_PASSWORD" >> android/key.properties
          echo "keyAlias=$CM_KEY_ALIAS" >> android/key.properties
          echo "keyPassword=$CM_KEY_PASSWORD" >> android/key.properties

      - name: Build Android Release APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - tadeo@example.com
        notify:
          success: true
          failure: true

  # ═══════════════════════════════════════════════════════════════════════
  # iOS — Necesita Apple Developer Account + perfiles en Codemagic
  # ═══════════════════════════════════════════════════════════════════════
  ios-release:
    name: RaveSync iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: com.tadeo.ravesync
      vars:
        BUNDLE_ID: "com.tadeo.ravesync"
      node: 22.12.0
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "v*"
          include: true

    scripts:
      - name: Install npm dependencies
        script: |
          rm -f package-lock.json
          npm install

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor iOS
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App" \
            --config "Debug"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - tadeo@example.com
        notify:
          success: true
          failure: true
